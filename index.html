<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="機車保養">
  <meta name="theme-color" content="#f2f2f7">
  <title>機車保養紀錄</title>
  <style>
    :root{--bg:#f2f2f7;--card:#fff;--text:#111318;--muted:#6e6e73;--blue:#0a84ff;--line:#dddde5;--danger:#ff3b30;--dark:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;color-scheme:light}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-weight:650;-webkit-font-smoothing:antialiased}button,input,textarea,select{font:inherit}button{border:0;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}.app{max-width:560px;margin:0 auto;min-height:100dvh;padding-bottom:calc(92px + env(safe-area-inset-bottom))}.topbar{position:sticky;top:0;z-index:5;height:calc(56px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 16px 0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:rgba(242,242,247,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(216,216,222,.8)}.title{font-size:17px;font-weight:800}.link{color:var(--blue);font-size:17px;min-height:44px}.right{justify-self:end}.left{justify-self:start}.screen{display:none}.screen.active{display:block}.home-title{font-size:34px;line-height:1.1;margin:0;padding:24px 20px 12px}.section{padding:0 20px 20px}.section-head{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:800;padding:10px 2px}.pill{min-width:44px;height:34px;border-radius:18px;background:var(--dark);color:#fff;font-size:22px;display:grid;place-items:center;box-shadow:0 4px 12px rgba(31,41,55,.18)}.vehicle{width:100%;min-height:86px;margin:0 0 10px;padding:14px 16px;border-radius:14px;background:var(--card);display:grid;grid-template-columns:56px minmax(0,1fr) auto;align-items:center;gap:14px;text-align:left;box-shadow:0 1px 0 rgba(0,0,0,.04)}.icon{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;background:#e7f1ff;color:var(--blue);font-size:26px}.name{display:block;font-size:21px;font-weight:800;overflow-wrap:anywhere}.sub{display:block;margin-top:6px;color:var(--muted);font-size:14px;font-weight:600}.arrow{color:var(--blue);font-size:28px}.empty{padding:60px 28px;text-align:center;color:var(--muted);font-size:17px;line-height:1.6}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px 10px}.summary div{background:#fff;border-radius:14px;padding:12px 10px;min-height:70px;color:var(--muted);font-size:11px;font-weight:800}.summary strong{display:block;margin-top:8px;color:var(--text);font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.search{padding:8px 16px 12px}.search input,.input,.textarea,.select{width:100%;border:0;outline:none;border-radius:14px;background:#fff;color:var(--text);min-height:56px;padding:15px 16px;font-size:18px;font-weight:650}.search input{background:#e7eaf0;min-height:46px;font-size:15px}.records{padding:0 20px 20px}.year{width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 2px 10px;font-size:24px;font-weight:900;text-align:left}.year span{font-size:15px;color:var(--muted)}.record{width:100%;min-height:96px;border-radius:14px;background:#fff;margin-bottom:10px;padding:16px;display:grid;grid-template-columns:52px minmax(0,1fr) 100px;gap:12px;align-items:center;text-align:left}.record-title{font-size:18px;font-weight:850}.note{display:block;margin-top:8px;color:var(--muted);font-size:13px;line-height:1.35}.meta{text-align:right;white-space:nowrap;color:#484a51;font-size:14px}.money{display:block;color:#0a6fd6;font-size:18px;font-weight:900;margin:2px 0}.fab,.save{position:fixed;right:max(20px,calc((100vw - 560px)/2 + 20px));bottom:calc(24px + env(safe-area-inset-bottom));z-index:10;border-radius:999px;background:#1c1c1e;color:#fff;box-shadow:0 8px 22px rgba(31,41,55,.26)}.fab{width:58px;height:58px;font-size:34px}.save{min-width:84px;height:50px;font-size:17px;font-weight:800}.form{padding:20px}.field{display:block;margin-bottom:18px}.label{display:block;margin:0 0 8px 2px;color:#5a5c63;font-size:15px;font-weight:700}.textarea{min-height:116px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.danger{color:var(--danger)}.sheet,.modal{position:fixed;inset:0;z-index:30;display:none;align-items:flex-end;background:rgba(0,0,0,.25);padding:18px}.sheet.open,.modal.open{display:flex}.panel{width:100%;max-width:560px;margin:0 auto;border-radius:18px;background:rgba(255,255,255,.96);padding:16px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 18px 42px rgba(30,35,45,.2);backdrop-filter:blur(20px)}.sheet-title{text-align:center;color:var(--muted);font-size:14px;margin:6px 0 12px}.sheet-btn{width:100%;min-height:54px;margin-top:8px;border-radius:10px;background:#f6f7fb;color:var(--blue);font-size:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.modal-btn{min-height:46px;border-radius:12px;background:#eef0f4}.primary{background:#1c1c1e;color:#fff}.hidden{display:none!important}.file{display:none}@media(max-width:380px){.row{grid-template-columns:1fr}.record{grid-template-columns:48px minmax(0,1fr) 88px;padding:14px}.home-title{font-size:31px}.summary strong{font-size:14px}}
  </style>
</head>
<body>
<main class="app">
  <section id="home" class="screen active">
    <header class="topbar"><div></div><strong class="title">保養管理</strong><div class="right"><button id="homeMenu" class="link">⋯</button></div></header>
    <h1 class="home-title">我的車輛</h1>
    <div class="section" id="vehicleList"></div>
    <div class="empty hidden" id="vehicleEmpty">還沒有車輛。<br>按機車或汽車旁邊的 + 新增車型。</div>
  </section>
  <section id="list" class="screen">
    <header class="topbar"><button id="backHome" class="link left">‹ 返回</button><strong id="vehicleTitle" class="title"></strong><div class="right"><button id="listMenu" class="link">⋯</button></div></header>
    <div class="summary"><div>今年花費<strong id="yearTotal">$0</strong></div><div>筆數<strong id="countTotal">0</strong></div><div>最新里程<strong id="latestMileage">0 公里</strong></div></div>
    <div class="search"><input id="search" type="search" placeholder="搜尋保養項目、廠牌、備註"></div>
    <div class="records" id="recordList"></div>
    <div class="empty hidden" id="recordEmpty">還沒有保養紀錄。<br>按右下角 + 新增第一筆。</div>
    <button id="addRecord" class="fab">+</button>
  </section>
  <section id="form" class="screen">
    <header class="topbar"><button id="backList" class="link left">‹ 返回</button><strong id="formTitle" class="title">新增紀錄</strong><button id="deleteRecord" class="link right danger hidden">刪除</button></header>
    <form id="recordForm" class="form">
      <input id="id" type="hidden">
      <label class="field"><span class="label">金額</span><input id="amount" class="input" inputmode="numeric" placeholder="例如 1500" required></label>
      <label class="field"><span class="label">車輛</span><input id="vehicle" class="input" placeholder="例如 MMBCU" required></label>
      <label class="field"><span class="label">保養項目</span><select id="category" class="select"></select></label>
      <label class="field hidden" id="customWrap"><span class="label">自訂項目</span><input id="customCategory" class="input" placeholder="例如 變速箱油"></label>
      <label class="field"><span class="label">里程數</span><input id="mileage" class="input" inputmode="numeric" placeholder="例如 13700" required></label>
      <div class="row"><label class="field"><span class="label">日期</span><input id="date" class="input" type="date" required></label><label class="field"><span class="label">廠牌</span><input id="brand" class="input" placeholder="例如 pakelo"></label></div>
      <label class="field"><span class="label">備註</span><textarea id="note" class="textarea" placeholder="可填更換內容、油品、店家..."></textarea></label>
    </form>
    <button class="save" type="submit" form="recordForm">儲存</button>
  </section>
</main>
<div id="vehicleModal" class="modal"><div class="panel"><div class="sheet-title" id="vehicleModalTitle">新增車型</div><input id="newVehicle" class="input" placeholder="例如 MMBCU"><div class="actions"><button id="cancelVehicle" class="modal-btn">取消</button><button id="saveVehicle" class="modal-btn primary">新增</button></div></div></div>
<div id="sheet" class="sheet"><div class="panel"><div id="cloudStatus" class="sheet-title">Firebase 尚未設定</div><button id="exportBtn" class="sheet-btn">下載 JSON 備份</button><button id="importBtn" class="sheet-btn">匯入 JSON 備份</button><button id="setupFirebase" class="sheet-btn">設定 Firebase</button><button id="backupFirebase" class="sheet-btn">備份到 Firebase</button><button id="restoreFirebase" class="sheet-btn">從 Firebase 還原</button><button id="clearAll" class="sheet-btn danger">清空本機資料</button><button id="closeSheet" class="sheet-btn">取消</button></div></div>
<input id="importFile" class="file" type="file" accept="application/json,.json">
<script>
const K_RECORDS='motorcycle-maintenance-records-v1',K_VEHICLES='motorcycle-maintenance-vehicles-v1',K_FIREBASE='motorcycle-maintenance-firebase-v1',SDK='10.12.5';
const categories=[['engine-oil','機油','🛢️'],['gear-oil','齒輪油','🧴'],['coolant','水箱精','💧'],['tire','輪胎','⚫'],['battery','電瓶','🔋'],['brake','煞車','🛑'],['filter','空濾','🌬️'],['belt','皮帶','⛓️'],['transmission-oil','變速箱油','🧴'],['wiper','雨刷','🧰'],['ac-filter','冷氣濾網','🌬️'],['other','其他','🔧']].map(([id,name,icon])=>({id,name,icon}));
const $=s=>document.querySelector(s), today=()=>new Date().toISOString().slice(0,10), money=v=>'$'+Number(v||0).toLocaleString('zh-TW'), num=v=>Number(v||0).toLocaleString('zh-TW'), clean=v=>String(v||'').replace(/[^\d]/g,''), esc=t=>String(t??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
let records=load(K_RECORDS,[]), vehicles=load(K_VEHICLES,[]), currentVehicle='', currentType='motorcycle', pendingType='motorcycle', search='', firebaseApp=null, collapsed=new Set();
function load(k,f){try{const v=JSON.parse(localStorage.getItem(k)||'null');return v??f}catch{return f}}function save(){localStorage.setItem(K_RECORDS,JSON.stringify(records));localStorage.setItem(K_VEHICLES,JSON.stringify(vehicles))}
function show(id){['home','list','form'].forEach(x=>$('#'+x).classList.toggle('active',x===id));scrollTo(0,0)}
function vehicleId(name,type){return type+':'+String(name).trim().toLowerCase()}function vLabel(t){return t==='car'?'汽車':'機車'}function vIcon(t){return t==='car'?'🚗':'🛵'}function cat(id){return categories.find(c=>c.id===id)||categories.at(-1)}
function recordType(r){return r.vehicleType==='car'?'car':'motorcycle'}function vehicleRecords(name=currentVehicle,type=currentType){return records.filter(r=>r.vehicle===name&&recordType(r)===type)}
function addVehicle(name,type){name=String(name||'').trim();if(!name)return null;const id=vehicleId(name,type);let v=vehicles.find(x=>x.id===id);if(v)return v;v={id,name,type,createdAt:today()};vehicles=[...vehicles,v];save();return v}
function ensureVehicles(){let changed=false;records.forEach(r=>{if(!r.vehicle)return;const id=vehicleId(r.vehicle,recordType(r));if(!vehicles.some(v=>v.id===id)){vehicles.push({id,name:r.vehicle,type:recordType(r),createdAt:r.date||today()});changed=true}});if(changed)save()}
function renderVehicles(){const sections=[['motorcycle','機車'],['car','汽車']];let total=0;$('#vehicleList').innerHTML=sections.map(([type,title])=>{const list=vehicles.filter(v=>v.type===type).sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));total+=list.length;return `<div class="section-head"><span>${title}</span><button class="pill" data-add="${type}">+</button></div>${list.length?list.map(v=>vehicleCard(v)).join(''):`<div class="sub" style="padding:8px 2px 18px">尚無${title}車型</div>`}`}).join('');$('#vehicleEmpty').classList.toggle('hidden',total>0)}
function vehicleCard(v){const rs=vehicleRecords(v.name,v.type), total=rs.reduce((s,r)=>s+Number(r.amount||0),0), latest=rs.reduce((m,r)=>Math.max(m,Number(r.mileage||0)),0);return `<button class="vehicle" data-open="${esc(v.name)}" data-type="${v.type}"><span class="icon">${vIcon(v.type)}</span><span><span class="name">${esc(v.name)}</span><span class="sub">${rs.length} 筆 · ${num(latest)} 公里 · ${money(total)}</span></span><span class="arrow">›</span></button>`}
function openVehicle(name,type){currentVehicle=name;currentType=type;search='';collapsed=new Set();$('#vehicleTitle').textContent=name;$('#search').value='';show('list');renderList()}
function renderList(){const rs=vehicleRecords().sort((a,b)=>String(b.date).localeCompare(String(a.date))||Number(b.mileage)-Number(a.mileage));const kw=search.trim().toLowerCase();const visible=rs.filter(r=>!kw||[cat(r.category).name,r.categoryName,r.vehicle,r.brand,r.note,r.amount,r.mileage,r.date].some(x=>String(x||'').toLowerCase().includes(kw)));const y=new Date().getFullYear();const yr=rs.filter(r=>new Date(r.date||today()).getFullYear()===y);$('#yearTotal').textContent=money(yr.reduce((s,r)=>s+Number(r.amount||0),0));$('#countTotal').textContent=String(rs.length);$('#latestMileage').textContent=num(rs.reduce((m,r)=>Math.max(m,Number(r.mileage||0)),0))+' 公里';$('#recordEmpty').classList.toggle('hidden',visible.length>0);const years=[...new Set(visible.map(r=>new Date(r.date||today()).getFullYear()))].sort((a,b)=>b-a);$('#recordList').innerHTML=years.map(year=>{const list=visible.filter(r=>new Date(r.date||today()).getFullYear()===year), col=collapsed.has(String(year));return `<button class="year" data-year="${year}">${year} 年<span>${list.length} 筆 ${col?'＋':'－'}</span></button>${col?'':list.map(recordCard).join('')}`}).join('')}
function recordCard(r){const c=cat(r.category), name=r.category==='other'&&r.categoryName?r.categoryName:c.name, note=[r.brand,r.note].filter(Boolean).join(' · '), date=r.date?String(r.date).slice(5):'';return `<button class="record" data-id="${r.id}"><span class="icon">${c.icon}</span><span><span class="record-title">${esc(name)}</span>${note?`<span class="note">${esc(note)}</span>`:''}</span><span class="meta"><span>${date}</span><span class="money">${money(r.amount)}</span><span>${num(r.mileage)} 公里</span></span></button>`}
function openForm(r){const edit=!!r;$('#formTitle').textContent=edit?'編輯紀錄':'新增紀錄';$('#deleteRecord').classList.toggle('hidden',!edit);$('#id').value=r?.id||'';$('#amount').value=r?.amount||'';$('#vehicle').value=r?.vehicle||currentVehicle||'';$('#category').value=r?.category||'engine-oil';$('#customCategory').value=r?.categoryName||'';$('#mileage').value=r?.mileage||'';$('#date').value=r?.date||today();$('#brand').value=r?.brand||'';$('#note').value=r?.note||'';updateCustom();show('form')}
function updateCustom(){const on=$('#category').value==='other';$('#customWrap').classList.toggle('hidden',!on);$('#customCategory').required=on}
function closeForm(){show('list');renderVehicles();renderList()}
function submit(e){e.preventDefault();const id=$('#id').value||Date.now().toString(36)+Math.random().toString(36).slice(2,8);const category=$('#category').value;const next={id,amount:Number(clean($('#amount').value)),vehicle:$('#vehicle').value.trim(),vehicleType:currentType,category,categoryName:category==='other'?$('#customCategory').value.trim():cat(category).name,mileage:Number(clean($('#mileage').value)),date:$('#date').value||today(),brand:$('#brand').value.trim(),note:$('#note').value.trim()};if(!next.amount||!next.vehicle||!next.mileage){alert('請填金額、車輛與里程數。');return}records=records.some(r=>r.id===id)?records.map(r=>r.id===id?next:r):[next,...records];currentVehicle=next.vehicle;currentType=next.vehicleType;addVehicle(next.vehicle,next.vehicleType);save();closeForm()}
function del(){const id=$('#id').value;if(!id||!confirm('確定刪除這筆紀錄？'))return;records=records.filter(r=>r.id!==id);save();closeForm()}
function exportJson(){const blob=new Blob([JSON.stringify({app:'機車保養紀錄',exportedAt:new Date().toISOString(),records,vehicles},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='機車保養紀錄-'+today()+'.json';a.click();URL.revokeObjectURL(url)}
function importJson(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const d=JSON.parse(reader.result), r=Array.isArray(d)?d:d.records;if(!Array.isArray(r))throw Error();records=r.filter(x=>x&&x.id);vehicles=Array.isArray(d.vehicles)?d.vehicles.filter(x=>x&&x.id):[];ensureVehicles();save();closeSheet();renderVehicles();renderList();alert('匯入完成。')}catch{alert('這個備份檔無法匯入。')}};reader.readAsText(file)}
function setupFb(){const cur=load(K_FIREBASE,null);const txt=prompt('貼上 Firebase Web App config 的 JSON。',cur?.config?JSON.stringify(cur.config,null,2):'');if(txt===null)return null;let config;try{config=JSON.parse(txt)}catch{alert('Firebase 設定不是正確 JSON。');return null}if(!config.apiKey||!config.projectId||!config.authDomain){alert('設定需要 apiKey、authDomain、projectId。');return null}const backupId=prompt('設定備份代碼。不同裝置輸入同樣代碼就能還原。',cur?.backupId||'my-motorcycle');if(!backupId)return null;const s={config,backupId:backupId.trim()};localStorage.setItem(K_FIREBASE,JSON.stringify(s));firebaseApp=null;alert('Firebase 設定已儲存。');return s}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`))return res();const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
async function ensureFb(){const settings=load(K_FIREBASE,null)||setupFb();if(!settings)throw Error('尚未設定 Firebase。');const base=`https://www.gstatic.com/firebasejs/${SDK}`;await loadScript(`${base}/firebase-app-compat.js`);await loadScript(`${base}/firebase-auth-compat.js`);await loadScript(`${base}/firebase-firestore-compat.js`);firebaseApp=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(settings.config);if(!firebase.auth().currentUser)await firebase.auth().signInAnonymously();return{db:firebase.firestore(),backupId:settings.backupId}}
async function fbBackup(){try{const {db,backupId}=await ensureFb();await db.collection('motorcycleMaintenanceBackups').doc(backupId).set({records,vehicles,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),count:records.length,source:'github-pages'});closeSheet();alert('已備份到 Firebase。')}catch(e){alert('Firebase 備份失敗：'+(e.message||'請檢查設定'))}}
async function fbRestore(){if(!confirm('會用 Firebase 備份覆蓋目前本機紀錄。建議先下載 JSON 備份。'))return;try{const {db,backupId}=await ensureFb();const snap=await db.collection('motorcycleMaintenanceBackups').doc(backupId).get();if(!snap.exists){alert('找不到這個備份代碼。');return}const d=snap.data();if(!Array.isArray(d.records)){alert('備份格式不正確。');return}records=d.records.filter(x=>x&&x.id);vehicles=Array.isArray(d.vehicles)?d.vehicles.filter(x=>x&&x.id):[];ensureVehicles();save();closeSheet();renderVehicles();renderList();alert('已從 Firebase 還原。')}catch(e){alert('Firebase 還原失敗：'+(e.message||'請檢查設定'))}}
function openSheet(){const s=load(K_FIREBASE,null);$('#cloudStatus').textContent=s?.backupId?'Firebase：'+s.backupId:'Firebase 尚未設定';$('#sheet').classList.add('open')}function closeSheet(){$('#sheet').classList.remove('open')}
function seed(){if(records.length||vehicles.length)return;records=[{id:'seed1',amount:1500,vehicle:'MMBCU',vehicleType:'motorcycle',category:'coolant',categoryName:'水箱精',mileage:1500,date:'2026-07-08',brand:'pakelo',note:'水箱精'},{id:'seed2',amount:100,vehicle:'MMBCU',vehicleType:'motorcycle',category:'gear-oil',categoryName:'齒輪油',mileage:13700,date:'2026-07-08',brand:'',note:''},{id:'seed3',amount:1900,vehicle:'MMBCU',vehicleType:'motorcycle',category:'tire',categoryName:'輪胎',mileage:13700,date:'2026-07-08',brand:'',note:''},{id:'seed4',amount:1200,vehicle:'MMBCU',vehicleType:'motorcycle',category:'battery',categoryName:'電瓶',mileage:10500,date:'2026-03-30',brand:'',note:''}];ensureVehicles();save()}
